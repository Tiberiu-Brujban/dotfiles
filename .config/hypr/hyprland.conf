source=~/.config/hypr/mocha.conf

monitor=eDP-1,2560x1600@240,0x0,1.6

xwayland {
    force_zero_scaling = true
}

# My Programs
$terminal = ghostty
$fileManager = thunar
$menu = wofi --show drun

# Autostart
exec-once = waybar & hyprpaper &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = xdg-desktop-portal-hyprland

# Custom Cursor
env = XDG_CURRENT_DESKTOP,Hyprland
env = GTK_THEME,catppuccin-mocha-mauve-standard+default
env = GTK_ICON_THEME,Papirus-Dark
env = GTK_USE_PORTAL,1
env = HYPRCURSOR_THEME, catppuccin-mocha-mauve-cursors
env = HYPRCURSOR_SIZE, 24
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = QT_QPA_PLATFORM,wayland
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1

general {
    gaps_in = 0
    gaps_out = 0

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $mauve $sapphire 90deg
    col.inactive_border = $surface0

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}


decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}


animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 1.5, default
    animation = border, 1, 1.5, easeOutQuint
    animation = windows, 1, 1.5, easeOutQuint
    animation = windowsIn, 1, 1.5, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.5, linear, popin 87%
    animation = fadeIn, 1, 1.5, almostLinear
    animation = fadeOut, 1, 1.5, almostLinear
    animation = fade, 1, 1.5, quick
    animation = layers, 1, 1.5, easeOutQuint
    animation = layersIn, 1, 1.5, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.5, almostLinear
    animation = fadeLayersOut, 1, 1.5, almostLinear
    animation = workspaces, 0, 1.5, almostLinear, fade
    animation = workspacesIn, 0, 1.5, almostLinear, fade
    animation = workspacesOut, 0, 1.5, almostLinear, fade
}


dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}


master {
    new_status = master
}


input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = false
    }
}


#gestures {
#   workspace_swipe = false
#}


device {
    name = logitech-g305-1
    sensitivity = 0.2
    accel_profile = flat
}


# Keybindings
$mainMod = ALT

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod SHIFT, M, exec, wlogout
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, C, togglesplit, # dwindle
bind = $mainMod, PAUSE, exec, pavucontrol
#bind = $mainMod SHIFT, S, exec, hyprshot -m region --clipboard-only
#bind = $mainMod, S, exec, hyprshot -m region -o /mnt/hdd/screenshots
#bind = $mainMod SHIFT, S, exec, QT_SCALE_FACTOR=1 flameshot gui
bind = $mainMod, S, exec, grim -g "$(slurp)" ~/Pictures/screenshot_$(date +%F_%T).png
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, X, exec, hyprlock
bind = $mainMod, E, exec, pkill waybar || waybar &
bind = $mainMod, F, fullscreen
bind = $mainMod, F1, exec, zen-browser
bind = $mainMod, F3, exec, $fileManager
bind = $mainMod, F10, exec, discord --enable-features=UseOzonePlatform --ozone-platform=wayland

# Resize windows
bind = $mainMod Control_L, H, resizeactive, -100 0
bind = $mainMod Control_L, J, resizeactive, 0 100
bind = $mainMod Control_L, K, resizeactive, 0 -100
bind = $mainMod Control_L, L, resizeactive, 100 0

bind = $mainMod Control_L, left, resizeactive, -100 0
bind = $mainMod Control_L, down, resizeactive, 0 100
bind = $mainMod Control_L, up, resizeactive, 0 -100
bind = $mainMod Control_L, right, resizeactive, 100 0


# Swap windows
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, J, swapwindow, d
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, L, swapwindow, r

bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, down, swapwindow, d
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, right, swapwindow, r


# Move focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10


# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# Ignore maximize requests from apps. You'll probably like this.
windowrule2 = suppressevent maximize, class:.*$


# Fix some dragging issues with XWayland
windowrule2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0


# Floating windows
windowrule = float 1, size 1280 720, center 1, match:class ^($fileManager)$
windowrule = float 1, size 1280 720, center 1, match:class ^(org\.pulseaudio\.pavucontrol)$
windowrule = float 1, size 1280 720, center 1, match:class ^(io.missioncenter.MissionCenter)$

# Bind window to workspace
windowrule = workspace 1 silent, match:class ^(zen)$
windowrule = workspace 10 silent, match:class ^(discord)$
